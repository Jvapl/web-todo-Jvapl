<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/todo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web todolist project</title>
  </head>
  <body>
    <main id="todo">
      <div>
        <h1>Web todolist app</h1>
        <p id="overdue-message">No overdue tasks</p>
      </div>
      <div id="cssTodo">
        <button type="button" id="task-to-do__remove-All-button">Delete All</button>
        <label for="todo-input">Add new task: <input type="text" id="todo-input"></label>
        <label for="todo-date-input">Date: <input type="date" id="todo-date-input"></label>
        <button id="add-todo-button" type="button">New Todo</button>
      </div>
      <p hidden id="error">Please enter a task !!</p>
      <ul id="todo-elements"></ul>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
